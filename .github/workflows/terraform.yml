name: "Terraform - PipelineIQ Infrastructure"

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to target"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - dev
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.6.6"
  TF_IN_AUTOMATION: "true"

jobs:
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest

    env:
      TF_VAR_jumpbox_admin_password: ${{ secrets.JUMPBOX_ADMIN_PASSWORD }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve environment
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV_NAME="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref_name }}" == "main" || "${{ github.base_ref }}" == "main" ]]; then
            ENV_NAME="prod"
          else
            ENV_NAME="dev"
          fi

          echo "ENV_NAME=$ENV_NAME" >> "$GITHUB_ENV"
          echo "TFVARS_FILE=env/${ENV_NAME}.tfvars" >> "$GITHUB_ENV"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set Azure Terraform environment
        shell: bash
        run: |
          echo "ARM_USE_OIDC=true" >> "$GITHUB_ENV"
          echo "ARM_CLIENT_ID=${{ vars.AZURE_CLIENT_ID }}" >> "$GITHUB_ENV"
          echo "ARM_TENANT_ID=${{ vars.AZURE_TENANT_ID }}" >> "$GITHUB_ENV"
          echo "ARM_SUBSCRIPTION_ID=${{ vars.AZURE_SUBSCRIPTION_ID }}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform format check
        shell: bash
        run: terraform fmt -check -recursive

      - name: Terraform init
        shell: bash
        run: terraform init -input=false

      - name: Select workspace
        shell: bash
        run: terraform workspace select "$ENV_NAME" || terraform workspace new "$ENV_NAME"

      - name: Terraform validate
        shell: bash
        run: terraform validate -no-color

      - name: Terraform plan
        shell: bash
        run: terraform plan -var-file="$TFVARS_FILE" -out=tfplan -input=false -no-color | tee plan_output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ env.ENV_NAME }}
          path: |
            tfplan
            plan_output.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const maxLen = 60000;
            const body = [
              `## Terraform Plan - ${process.env.ENV_NAME}`,
              '```hcl',
              plan.length > maxLen ? plan.slice(0, maxLen) + '\n\n... [truncated]' : plan,
              '```'
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  apply:
    name: "Terraform Apply"
    needs: plan
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment: ${{ github.event.inputs.environment == 'prod' && 'production' || 'development' }}

    env:
      ENV_NAME: ${{ github.event.inputs.environment }}
      TF_VAR_jumpbox_admin_password: ${{ secrets.JUMPBOX_ADMIN_PASSWORD }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set Azure Terraform environment
        shell: bash
        run: |
          echo "ARM_USE_OIDC=true" >> "$GITHUB_ENV"
          echo "ARM_CLIENT_ID=${{ vars.AZURE_CLIENT_ID }}" >> "$GITHUB_ENV"
          echo "ARM_TENANT_ID=${{ vars.AZURE_TENANT_ID }}" >> "$GITHUB_ENV"
          echo "ARM_SUBSCRIPTION_ID=${{ vars.AZURE_SUBSCRIPTION_ID }}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ env.ENV_NAME }}

      - name: Terraform init
        shell: bash
        run: terraform init -input=false

      - name: Select workspace
        shell: bash
        run: terraform workspace select "$ENV_NAME" || terraform workspace new "$ENV_NAME"

      - name: Terraform apply
        shell: bash
        run: terraform apply -input=false -auto-approve tfplan
